name: fintrack
description: "FinTrack - Aplicación de Finanzas Personales y Colaborativas"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3
  firebase_performance: ^0.10.0+8
  firebase_remote_config: ^5.1.3

  # Auth providers
  google_sign_in: ^6.2.1

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.3.0

  # DI
  injectable: ^2.4.4
  get_it: ^7.7.0

  # Charts
  fl_chart: ^0.69.0

  # Images
  cached_network_image: ^3.4.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  logger: ^2.4.0
  share_plus: ^10.1.4
  image_picker: ^1.1.2

  # Fonts
  google_fonts: ^6.2.1

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.11
  injectable_generator: ^2.4.1
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  # Android
  android: true
  min_sdk_android: 21
  image_path_android: "assets/images/LogoFintrack.png"
  adaptive_icon_background: "#2563EB"
  adaptive_icon_foreground: "assets/images/LogoFintrack.png"
  # iOS
  ios: true
  image_path_ios: "assets/images/LogoFintrack.png"
  remove_alpha_ios: true
  # Web
  web:
    generate: true
    image_path: "assets/images/LogoFintrack.png"
    background_color: "#2563EB"
    theme_color: "#2563EB"
